// ↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑

<style>
  :root {
    --bg: #ffffff;
    --bg2: #f6f6f4;
    --bg3: #f0efe9;
    --text: #1a1a1a;
    --text2: #666;
    --text3: #999;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 10px;
    --radius-sm: 7px;
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --success-border: rgba(59,109,17,0.3);
    --danger-bg: #fcebeb;
    --danger-text: #a32d2d;
    --danger-border: rgba(163,45,45,0.3);
    --info-bg: #e6f1fb;
    --info-text: #185fa5;
    --warning-bg: #faeeda;
    --warning-text: #854f0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --text: #f2f2f7;
      --text2: #aeaeb2;
      --text3: #636366;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --success-bg: #173404;
      --success-text: #c0dd97;
      --success-border: rgba(192,221,151,0.25);
      --danger-bg: #501313;
      --danger-text: #f09595;
      --danger-border: rgba(240,149,149,0.25);
      --info-bg: #042c53;
      --info-text: #85b7eb;
      --warning-bg: #412402;
      --warning-text: #fac775;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .screen { display: none; }
  .screen.active { display: block; }
  .wrap { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem; }
  .wrap-lg { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 12px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; cursor: pointer; font-size: 14px; color: var(--text); font-family: inherit; transition: background .15s; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: .85; }
  .btn-sm { padding: 6px 13px; font-size: 13px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
  input[type=text], input[type=password] {
    width: 100%; padding: 9px 13px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: var(--bg);
    color: var(--text); font-size: 14px; font-family: inherit;
    margin-top: 5px; outline: none; transition: border-color .15s;
  }
  input:focus { border-color: var(--text2); }
  label { font-size: 13px; color: var(--text2); display: block; }
  .opt { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 8px; transition: border-color .15s, background .15s; }
  .opt:hover:not(.locked) { border-color: var(--border2); background: var(--bg2); }
  .opt.selected { border-color: var(--text2); background: var(--bg2); }
  .opt.correct { border-color: var(--success-border) !important; background: var(--success-bg) !important; }
  .opt.wrong { border-color: var(--danger-border) !important; background: var(--danger-bg) !important; }
  .opt.locked { cursor: default; }
  .opt-letter { width: 23px; height: 23px; border-radius: 50%; border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; margin-top: 1px; color: var(--text2); }
  .opt-text { font-size: 14px; line-height: 1.55; color: var(--text); }
  .passage-box { background: var(--bg2); border-left: 3px solid var(--border2); padding: 13px 16px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 14px; line-height: 1.75; color: var(--text); margin-bottom: 16px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
  .progress-fill { height: 100%; background: var(--text); transition: width .3s; }
  .exp-box { border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; line-height: 1.6; margin-top: 12px; }
  .exp-correct { background: var(--success-bg); color: var(--success-text); border: 0.5px solid var(--success-border); }
  .exp-wrong { background: var(--danger-bg); color: var(--danger-text); border: 0.5px solid var(--danger-border); }
  .stat-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px 16px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 500; }
  .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .tab { padding: 7px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text2); font-family: inherit; background: none; border-top: none; border-left: none; border-right: none; transition: color .15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .spinner { width: 26px; height: 26px; border: 2px solid var(--border); border-top-color: var(--text2); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .domain-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
  .domain-row:last-child { border-bottom: none; }
  .mini-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .mini-fill { height: 100%; border-radius: 3px; transition: width .5s; }
  .trow { display: grid; grid-template-columns: 1fr 70px 70px 65px; gap: 8px; padding: 8px 4px; border-bottom: 0.5px solid var(--border); font-size: 13px; align-items: center; }
  .trow:last-child { border-bottom: none; }
  .thead { font-size: 12px; color: var(--text2); font-weight: 500; }
  .error-box { background: var(--danger-bg); border: 0.5px solid var(--danger-border); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; color: var(--danger-text); }
  .logo-area { text-align: center; margin-bottom: 2rem; padding-top: 1rem; }
  .domain-btn { height: 58px; flex-direction: column; gap: 2px; font-size: 12px; justify-content: center; width: 100%; }
  .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- LOGIN -->

  <div class="wrap" style="max-width:400px">
    <div class="logo-area">

    </div>

      <div style="display:flex;border-bottom:0.5px solid var(--border);margin-bottom:20px">

        <div style="margin-bottom:18px"><label>学生 ID（选填）<input type="text" id="sId" placeholder="例如 S001"></label></div>

      <div id="aFields" style="display:none">
        <div style="margin-bottom:16px"><label>管理员密码<input type="password" id="aPass" placeholder="输入密码" onkeydown="if(event.key==='Enter')adminLogin()"></label></div>
        <div id="aErr" style="display:none;font-size:13px;color:var(--danger-text);margin-bottom:8px">密码错误</div>
        <button class="btn btn-primary" style="width:100%" onclick="adminLogin()">进入管理面板</button>
      </div>
    </div>
    <p style="font-size:12px;color:var(--text3);text-align:center;margin-top:8px">每道题由 AI 即时生成，无重复</p>
  </div>
</div>

<!-- PRACTICE -->
<div id="practiceScreen" class="screen">
  <div class="wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:15px;font-weight:500" id="pName"></span>
        <span id="pBadge" class="badge" style="background:var(--bg2);color:var(--text2)"></span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="gotoStats()">成绩记录</button>
        <button class="btn btn-sm" onclick="logout()">退出</button>
      </div>

    <!-- Domain selector -->
    <div id="domainSel" class="card">
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px">选择练习题型 · AI 即时为你生成全新题目</div>
      <div class="domain-grid">
        <button class="btn domain-btn" onclick="startSession('all')">
          <span style="font-weight:500;font-size:13px">综合练习</span>
          <span style="color:var(--text2)">全部题型随机</span>

        <button class="btn domain-btn" onclick="startSession('Craft and Structure')">
          <span style="font-weight:500;font-size:13px">Craft &amp; Structure</span>
          <span style="color:var(--text2)">词汇 · 结构 · 跨文本</span>
        </button>
        <button class="btn domain-btn" onclick="startSession('Information and Ideas')">
          <span style="font-weight:500;font-size:13px">Information &amp; Ideas</span>
          <span style="color:var(--text2)">主旨 · 证据 · 推断</span>
        </button>
        <button class="btn domain-btn" onclick="startSession('Standard English Conventions')">
          <span style="font-weight:500;font-size:13px">Standard English</span>

      <button class="btn domain-btn" onclick="startSession('Expression of Ideas')">

          <div style="margin-top:14px;display:flex;justify-content:space-between;align-items:center">

              <button class="btn btn-primary btn-sm" id="btnSubmit" onclick="submitAns()" style="display:none">确认答案</button>
              <button class="btn btn-primary btn-sm" id="btnNext" onclick="nextQ()" style="display:none">下一题 →</button>

            <button class="btn btn-sm" id="btnSkip" onclick="skipQ()" style="display:none">跳过</button>

</div>

<!-- STATS -->
<div id="statsScreen" class="screen">
  <div class="wrap">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
      <button class="btn btn-sm" onclick="backToPractice()">← 返回</button>
      <span style="font-size:15px;font-weight:500" id="statsTitle">我的成绩</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">
      <div class="stat-card"><div class="stat-num" id="stTotal">0</div><div class="stat-lbl">总题数</div></div>
      <div class="stat-card"><div class="stat-num" id="stCorrect">0</div><div class="stat-lbl">答对</div></div>
      <div class="stat-card"><div class="stat-num" id="stRate">—</div><div class="stat-lbl">正确率</div></div>

      <div style="font-size:13px;font-weight:500;margin-bottom:10px">最近答题记录</div>
      <div class="trow thead"><span>题型</span><span>难度</span><span>结果</span><span>时间</span></div>
      <div id="stHistory"></div>

</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div class="wrap-lg">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
      <span style="font-size:15px;font-weight:500">管理面板</span>
      <button class="btn btn-sm" onclick="logout()">退出</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
      <div class="stat-card"><div class="stat-num" id="adStudents">0</div><div class="stat-lbl">学生总数</div></div>
      <div class="stat-card"><div class="stat-num" id="adQuestions">0</div><div class="stat-lbl">总答题</div></div>
      <div class="stat-card"><div class="stat-num" id="adRate">—</div><div class="stat-lbl">平均正确率</div></div>
      <div class="stat-card"><div class="stat-num" id="adActive">0</div><div class="stat-lbl">本周活跃</div></div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:500;margin-bottom:10px">学生进度</div>
      <div class="trow thead" style="grid-template-columns:1fr 70px 70px 80px"><span>学生</span><span>题数</span><span>正确率</span><span>状态</span></div>
      <div id="adTable"></div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:500;margin-bottom:12px">各题型全局表现</div>
      <div id="adDomains"></div>
    </div>
  </div>
</div>

<script>
const ADMIN_PASS = "sat2025";
const SK = "sat_platform_v2";
const DOMAINS = [
  "Craft and Structure",
  "Information and Ideas",
  "Standard English Conventions",
  "Expression of Ideas"
];
const DC = {
  "Craft and Structure": "#378ADD",
  "Information and Ideas": "#1D9E75",
  "Standard English Conventions": "#BA7517",
  "Expression of Ideas": "#D4537E"
};
const SESSION_LEN = 5;
let user = null, queue = [], qIdx = 0, curQ = null, selOpt = null, answered = false;

function db() { try { return JSON.parse(localStorage.getItem(SK) || '{"students":{}}'); } catch(e) { return {students:{}}; } }
function save(d) { try { localStorage.setItem(SK, JSON.stringify(d)); } catch(e) {} }
function ukey(n, id) { return (n + (id ? '_' + id : '')).toLowerCase().replace(/\s+/g, '_'); }

function switchTab(t) {
  ['s','a'].forEach(x => {
    document.getElementById('tab'+x.toUpperCase()).classList.toggle('active', x===t);
    document.getElementById(x+'Fields').style.display = x===t ? 'block' : 'none';
  });
}

function studentLogin() {
  const n = document.getElementById('sName').value.trim();
  const errEl = document.getElementById('sErr');
  if (!n) { errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  const id = document.getElementById('sId').value.trim();
  user = { name: n, id, key: ukey(n, id) };
  const d = db();
  if (!d.students[user.key]) d.students[user.key] = { name: n, id, history: [], lastSeen: Date.now() };
  else d.students[user.key].lastSeen = Date.now();
  save(d);
  document.getElementById('pName').textContent = n;
  document.getElementById('pBadge').textContent = id ? 'ID: ' + id : '学生';
  showScreen('practiceScreen');
  document.getElementById('qArea').style.display = 'none';
  document.getElementById('domainSel').style.display = 'block';
  document.getElementById('apiErrBanner').style.display = 'none';
}

function adminLogin() {
  if (document.getElementById('aPass').value !== ADMIN_PASS) {
    document.getElementById('aErr').style.display = 'block'; return;
  }
  showScreen('adminScreen');
  renderAdmin();
}

function logout() { user = null; showScreen('loginScreen'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function startSession(domain) {
  queue = [];
  if (domain === 'all') {
    const pool = [...DOMAINS, ...DOMAINS].sort(() => Math.random() - .5).slice(0, SESSION_LEN);
    queue = pool;
  } else {
    for (let i = 0; i < SESSION_LEN; i++) queue.push(domain);
  }
  qIdx = 0;
  document.getElementById('domainSel').style.display = 'none';
  document.getElementById('qArea').style.display = 'block';
  await loadQ();
}

async function loadQ() {
  if (qIdx >= queue.length) { gotoStats(); return; }
  curQ = null; selOpt = null; answered = false;
  const domain = queue[qIdx];
  document.getElementById('qNum').textContent = `${qIdx + 1} / ${queue.length}`;
  document.getElementById('qBar').style.width = (qIdx / queue.length * 100) + '%';
  const badge = document.getElementById('qBadge');
  badge.textContent = domain;
  badge.style.cssText = `background:${DC[domain]}22;color:${DC[domain]};font-size:12px;padding:3px 10px;border-radius:20px`;
  document.getElementById('qLoading').style.display = 'block';
  document.getElementById('qContent').style.display = 'none';
  document.getElementById('qLoadMsg').textContent = 'AI 正在生成题目...';
  document.getElementById('btnSubmit').style.display = 'none';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('btnSkip').style.display = 'none';
  try {
    const q = await generateQuestion(domain);
    curQ = q;
    renderQuestion(q);
  } catch(e) {
    document.getElementById('qLoading').innerHTML = `
      <div class="error-box" style="text-align:left">
        <div style="font-weight:500;margin-bottom:6px">题目生成失败</div>
        <div style="margin-bottom:10px;font-size:12px">${e.message}</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm" onclick="loadQ()">重试</button>
          <button class="btn btn-sm" onclick="backToPractice()">返回</button>
        </div>
      </div>`;
  }
}

async function generateQuestion(domain) {
  const diff = ['Easy','Medium','Hard'][Math.floor(Math.random()*3)];
  const topic = ['science','history','humanities','literature'][Math.floor(Math.random()*4)];
  const typeMap = {
    "Craft and Structure": ["Words in Context","Text Structure and Purpose","Cross-Text Connections"],
    "Information and Ideas": ["Central Ideas and Details","Command of Evidence","Inferences"],
    "Standard English Conventions": ["Boundaries","Form Structure and Sense"],
    "Expression of Ideas": ["Transitions","Rhetorical Synthesis"]
  };
  const types = typeMap[domain];
  const qtype = types[Math.floor(Math.random() * types.length)];

  const special = qtype === "Rhetorical Synthesis"
    ? `The passage MUST start with "While researching a topic, a student has taken the following notes:" followed by 3-4 bullet points.`
    : qtype === "Cross-Text Connections"
    ? `The passage MUST have two labeled sections "Text 1" and "Text 2" (40-70 words each) on the same topic with different viewpoints.`
    : domain === "Standard English Conventions"
    ? `The passage MUST contain a blank written exactly as "______" within a sentence. The question stem MUST be exactly: "Which choice completes the text so that it conforms to the conventions of Standard English?"`
    : '';

  const prompt = `You are a Digital SAT test designer. Generate ONE high-quality Reading and Writing practice question.

Domain: ${domain}
Question Type: ${qtype}
Difficulty: ${diff}
Passage Topic: ${topic}
${special}

Return ONLY valid JSON, no markdown fences, no extra text:
{"domain":"${domain}","type":"${qtype}","difficulty":"${diff}","passage":"passage text 25-150 words","question":"question stem","options":["A text","B text","C text","D text"],"answer":0,"explanation":"2-3 sentences explaining why correct answer is right and why the best wrong answer fails"}

"answer" is 0-based index of correct option. Make all 4 options plausible. Only one correct answer.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": API_KEY, "anthropic-version": "2023-06-01" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`API 错误 ${res.status} — 请确认此页面从 Claude.ai 内嵌打开，或检查网络`);
  }
  const data = await res.json();
  const text = data.content.find(b => b.type === "text")?.text || "";
  const clean = text.replace(/```json|```/g, "").trim();
  const q = JSON.parse(clean);
  if (!q.passage || !q.question || !Array.isArray(q.options) || q.options.length !== 4 || typeof q.answer !== "number")
    throw new Error("AI 返回格式异常，请重试");
  return q;
}

function renderQuestion(q) {
  document.getElementById('qLoading').style.display = 'none';
  document.getElementById('qContent').style.display = 'block';
  document.getElementById('qPassage').textContent = q.passage;
  document.getElementById('qStem').textContent = q.question;
  document.getElementById('qExp').style.display = 'none';
  const letters = ['A','B','C','D'];
  const opts = document.getElementById('qOpts');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.innerHTML = `<div class="opt-letter">${letters[i]}</div><div class="opt-text">${opt}</div>`;
    div.onclick = () => pickOpt(i);
    opts.appendChild(div);
  });
  document.getElementById('btnSubmit').style.display = 'none';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('btnSkip').style.display = 'inline-flex';
}

function pickOpt(i) {
  if (answered) return;
  selOpt = i;
  document.querySelectorAll('.opt').forEach((o, j) => o.classList.toggle('selected', j === i));
  document.getElementById('btnSubmit').style.display = 'inline-flex';
}

function submitAns() {
  if (selOpt === null || answered) return;
  answered = true;
  const correct = curQ.answer;
  const ok = selOpt === correct;
  document.querySelectorAll('.opt').forEach((o, j) => {
    o.classList.add('locked');
    o.classList.remove('selected');
    if (j === correct) o.classList.add('correct');
    else if (j === selOpt && !ok) o.classList.add('wrong');
  });
  const exp = document.getElementById('qExp');
  exp.style.display = 'block';
  exp.innerHTML = `<div class="exp-box ${ok ? 'exp-correct' : 'exp-wrong'}">
    <div style="font-weight:500;margin-bottom:4px">${ok ? '✓ 正确！' : '✗ 答案是 ' + ['A','B','C','D'][correct]}</div>
    <div>${curQ.explanation}</div>
  </div>`;
  document.getElementById('btnSubmit').style.display = 'none';
  document.getElementById('btnSkip').style.display = 'none';
  document.getElementById('btnNext').style.display = 'inline-flex';
  const d = db();
  if (!d.students[user.key]) d.students[user.key] = { name: user.name, id: user.id, history: [], lastSeen: Date.now() };
  d.students[user.key].history.push({ domain: curQ.domain, type: curQ.type, difficulty: curQ.difficulty, correct: ok, ts: Date.now() });
  d.students[user.key].lastSeen = Date.now();
  save(d);
}

async function nextQ() { qIdx++; await loadQ(); }
async function skipQ() { qIdx++; await loadQ(); }

function gotoStats() {
  showScreen('statsScreen');
  const h = (db().students[user.key] || {}).history || [];
  document.getElementById('statsTitle').textContent = user.name + ' 的成绩';
  renderStats(h);
}

function backToPractice() {
  showScreen('practiceScreen');
  document.getElementById('qArea').style.display = 'none';
  document.getElementById('domainSel').style.display = 'block';
}

function renderStats(h) {
  const total = h.length, correct = h.filter(x => x.correct).length;
  document.getElementById('stTotal').textContent = total;
  document.getElementById('stCorrect').textContent = correct;
  document.getElementById('stRate').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '—';
  const dc = document.getElementById('stDomains');
  dc.innerHTML = '';
  DOMAINS.forEach(dom => {
    const dh = h.filter(x => x.domain === dom);
    const dr = dh.length > 0 ? Math.round(dh.filter(x => x.correct).length / dh.length * 100) : null;
    dc.innerHTML += `<div class="domain-row">
      <div style="font-size:13px;width:195px;flex-shrink:0">${dom}</div>
      <div class="mini-bar"><div class="mini-fill" style="width:${dr||0}%;background:${DC[dom]}"></div></div>
      <div style="font-size:13px;color:var(--text2);width:85px;text-align:right">${dr !== null ? dr + '% (' + dh.length + ')' : '—'}</div>
    </div>`;
  });
  const hc = document.getElementById('stHistory');
  const recent = [...h].reverse().slice(0, 10);
  if (!recent.length) { hc.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:10px 0">暂无记录</div>'; return; }
  hc.innerHTML = recent.map(x => {
    const t = new Date(x.ts);
    const ts = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
    const dc = x.difficulty === 'Easy' ? 'color:#3b6d11' : x.difficulty === 'Hard' ? 'color:#a32d2d' : 'color:#854f0b';
    return `<div class="trow">
      <span style="font-size:12px;color:var(--text2)">${x.type || x.domain}</span>
      <span style="font-size:12px;${dc}">${x.difficulty}</span>
      <span class="badge" style="font-size:11px;background:${x.correct ? 'var(--success-bg)' : 'var(--danger-bg)'};color:${x.correct ? 'var(--success-text)' : 'var(--danger-text)'}">${x.correct ? '✓' : '✗'}</span>
      <span style="font-size:12px;color:var(--text3)">${ts}</span>
    </div>`;
  }).join('');
}

function renderAdmin() {
  const d = db();
  const students = Object.values(d.students);
  const now = Date.now();
  const active = students.filter(s => (now - (s.lastSeen || 0)) < 7*24*60*60*1000).length;
  const allH = students.flatMap(s => s.history || []);
  const tq = allH.length, tc = allH.filter(h => h.correct).length;
  document.getElementById('adStudents').textContent = students.length;
  document.getElementById('adQuestions').textContent = tq;
  document.getElementById('adRate').textContent = tq > 0 ? Math.round(tc / tq * 100) + '%' : '—';
  document.getElementById('adActive').textContent = active;
  const tbl = document.getElementById('adTable');
  if (!students.length) { tbl.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:10px 0">暂无学生数据</div>'; }
  else {
    tbl.innerHTML = students.sort((a,b) => (b.lastSeen||0) - (a.lastSeen||0)).map(s => {
      const h = s.history || [];
      const r = h.length > 0 ? Math.round(h.filter(x => x.correct).length / h.length * 100) + '%' : '—';
      const isA = (now - (s.lastSeen||0)) < 7*24*60*60*1000;
      return `<div class="trow" style="grid-template-columns:1fr 70px 70px 80px">
        <span style="font-size:13px">${s.name}${s.id ? ' <span style="color:var(--text3);font-size:11px">('+s.id+')</span>' : ''}</span>
        <span style="font-size:13px">${h.length}</span>
        <span style="font-size:13px">${r}</span>
        <span class="badge" style="font-size:11px;background:${isA?'var(--success-bg)':'var(--bg2)'};color:${isA?'var(--success-text)':'var(--text2)'}">${isA?'活跃':'不活跃'}</span>
      </div>`;
    }).join('');
  }
  const adc = document.getElementById('adDomains');
  adc.innerHTML = '';
  DOMAINS.forEach(dom => {
    const dh = allH.filter(h => h.domain === dom);
    const dr = dh.length > 0 ? Math.round(dh.filter(h => h.correct).length / dh.length * 100) : null;
    adc.innerHTML += `<div class="domain-row">
      <div style="font-size:13px;width:210px;flex-shrink:0">${dom}</div>
      <div class="mini-bar"><div class="mini-fill" style="width:${dr||0}%;background:${DC[dom]}"></div></div>
      <div style="font-size:13px;color:var(--text2);width:110px;text-align:right">${dr !== null ? dr + '% (' + dh.length + '题)' : '—'}</div>
    </div>`;
  });
}
</script>
</body>
</html>
